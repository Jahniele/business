<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Builder</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .page { display: none; padding: 20px; border: 1px solid #ccc; margin-top: 10px; border-radius: 8px; }
    button { margin-right: 10px; padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>

  <h1>💻 AI Builder</h1>

  <!-- Navigation -->
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('builder')">Builder</button>
  <button onclick="showPage('about')">About</button>

  <!-- Pages -->
  <div id="home" class="page">
    <h2>Welcome Home</h2>
<p>Test update</p>
  </div>

  <div id="builder" class="page">
    <h2>AI Builder</h2>
    <p>Enter your app name:</p>
    <input type="text" id="appName" placeholder="App name">
    <button onclick="createApp()">Create App</button>

    <h3>Your Apps:</h3>
    <ul id="appsList"></ul>
  </div>

  <div id="about" class="page">
    <h2>About</h2>
    <p>This is a fully functional single-page AI builder.</p>
  </div>

  <script>
    // Show selected page
    function showPage(id) {
      const pages = document.querySelectorAll('.page');
      pages.forEach(p => p.style.display = 'none');
      document.getElementById(id).style.display = 'block';
      window.location.hash = id; // update URL
    }

    // Show home by default
    showPage(window.location.hash ? window.location.hash.substring(1) : 'home');

    // Simple app creation
    function createApp() {
      const nameInput = document.getElementById('appName');
      const name = nameInput.value.trim();
      if(!name) return alert("Enter a valid app name.");

      const appsList = document.getElementById('appsList');
      const li = document.createElement('li');
      li.textContent = name;
      appsList.appendChild(li);

      nameInput.value = "";
    }
  </script>

</body>
</html>
