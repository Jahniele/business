<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Builder</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 60%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #00ffcc;
      border: none;
      cursor: pointer;
    }

    pre {
      background: black;
      padding: 20px;
      margin-top: 20px;
      text-align: left;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<h1>AI Website Builder</h1>

<input id="prompt" placeholder="Describe your website...">
<br>
<div onclick="generateApp('My App')">Build App</div>

<div id="output"></div>

<script>
function generateSite() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!prompt) {
    alert("Enter something first");
    return;
  }

  const site = `
<!DOCTYPE html>
<html>
<head>
  <title>${prompt}</title>
</head>
<body>
  <h1>${prompt}</h1>
  <p>This site was generated by AI Builder</p>
</body>
</html>
  `;

  output.textContent = site;
}
</script>

</body>
</html>
